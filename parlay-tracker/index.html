<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ParlayLab · tracker de apuestas</title>
<style>
  :root {
    --bg: #0a0e16;
    --panel: #121a28;
    --panel2: #0e1521;
    --border: #1e2a3d;
    --text: #e7eef8;
    --muted: #8593a8;
    --green: #16c784;
    --green-dim: #0f3d2e;
    --red: #ea3943;
    --red-dim: #3d1518;
    --blue: #2f81f7;
    --amber: #f0b429;
    --shadow: 0 18px 50px rgba(0,0,0,.45);
    --r: 16px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(1200px 600px at 15% -10%, #16223a 0%, transparent 55%),
                radial-gradient(1000px 500px at 110% 10%, #11302a 0%, transparent 50%),
                var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 22px 80px; }

  header.top {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    margin-bottom: 26px;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .ball {
    width: 38px; height: 38px; border-radius: 50%;
    background: conic-gradient(from 210deg, var(--green), var(--blue), var(--green));
    box-shadow: 0 0 24px rgba(22,199,132,.45);
  }
  .logo h1 { font-size: 24px; margin: 0; letter-spacing: -.5px; }
  .logo span { color: var(--muted); font-size: 13px; }
  .spacer { flex: 1; }
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .btn {
    border: 1px solid var(--border); background: var(--panel); color: var(--text);
    padding: 10px 16px; border-radius: 12px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: .15s; display: inline-flex; align-items: center; gap: 8px;
  }
  .btn:hover { border-color: #33455f; transform: translateY(-1px); }
  .btn.primary { background: linear-gradient(135deg, var(--green), #0fa968); border: none; color: #04130d; }
  .btn.ghost { background: transparent; }
  .btn.sm { padding: 6px 11px; font-size: 13px; border-radius: 10px; }
  .btn.win { color: var(--green); border-color: var(--green-dim); }
  .btn.lose { color: var(--red); border-color: var(--red-dim); }

  .seg { display: inline-flex; background: var(--panel2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .seg button { background: transparent; border: 0; color: var(--muted); padding: 9px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .seg button.active { background: var(--panel); color: var(--text); }

  /* KPIs */
  .kpis { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 16px; }
  .kpi { background: linear-gradient(180deg, var(--panel), var(--panel2)); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 18px; box-shadow: var(--shadow); }
  .kpi .lbl { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .6px; }
  .kpi .val { font-size: 26px; font-weight: 800; margin-top: 6px; letter-spacing: -.5px; }
  .kpi .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .pos { color: var(--green); } .neg { color: var(--red); }

  /* charts */
  .grid { display: grid; grid-template-columns: 1.7fr 1fr; gap: 14px; margin-bottom: 16px; }
  .card { background: linear-gradient(180deg, var(--panel), var(--panel2)); border: 1px solid var(--border); border-radius: var(--r); padding: 18px; box-shadow: var(--shadow); }
  .card h3 { margin: 0 0 12px; font-size: 14px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .6px; }
  .donutwrap { display: flex; align-items: center; gap: 18px; }
  .legend { font-size: 13px; display: grid; gap: 8px; }
  .legend div { display: flex; align-items: center; gap: 8px; color: var(--muted); }
  .dot { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }
  .bars { display: grid; gap: 9px; }
  .barrow { display: grid; grid-template-columns: 150px 1fr 92px; align-items: center; gap: 10px; font-size: 13px; }
  .barrow .name { color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track { height: 18px; background: #0c131e; border-radius: 6px; position: relative; overflow: hidden; }
  .fill { height: 100%; border-radius: 6px; }

  /* list */
  .listhead { display: flex; align-items: center; gap: 12px; margin: 22px 0 12px; }
  .listhead h2 { font-size: 18px; margin: 0; }
  .ticket { background: linear-gradient(180deg, var(--panel), var(--panel2)); border: 1px solid var(--border); border-left: 4px solid var(--border); border-radius: 14px; padding: 16px 18px; margin-bottom: 12px; }
  .ticket.ganada { border-left-color: var(--green); }
  .ticket.perdida { border-left-color: var(--red); }
  .ticket.pendiente { border-left-color: var(--amber); }
  .ticket.push { border-left-color: var(--blue); }
  .trow { display: flex; align-items: flex-start; gap: 14px; flex-wrap: wrap; }
  .tinfo { flex: 1; min-width: 220px; }
  .tname { font-weight: 700; font-size: 16px; }
  .tmeta { color: var(--muted); font-size: 12.5px; margin-top: 2px; }
  .legs { margin: 10px 0 0; display: grid; gap: 5px; }
  .leg { display: flex; justify-content: space-between; font-size: 13px; background: #0c131e; border: 1px solid var(--border); border-radius: 9px; padding: 6px 11px; }
  .leg .o { color: var(--blue); font-weight: 700; }
  .tnums { text-align: right; min-width: 150px; }
  .tnums .big { font-size: 22px; font-weight: 800; }
  .tnums small { color: var(--muted); font-size: 12px; }
  .badge { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; padding: 4px 10px; border-radius: 999px; }
  .b-ganada { background: var(--green-dim); color: var(--green); }
  .b-perdida { background: var(--red-dim); color: var(--red); }
  .b-pendiente { background: #3a2e0e; color: var(--amber); }
  .b-push { background: #10243d; color: var(--blue); }
  .tactions { display: flex; gap: 7px; margin-top: 12px; flex-wrap: wrap; }

  .empty { text-align: center; color: var(--muted); padding: 50px 20px; }

  /* modal */
  .overlay { position: fixed; inset: 0; background: rgba(3,6,12,.72); backdrop-filter: blur(4px); display: none; align-items: flex-start; justify-content: center; padding: 40px 16px; z-index: 50; overflow: auto; }
  .overlay.show { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 18px; width: 540px; max-width: 100%; padding: 22px 22px 18px; box-shadow: var(--shadow); }
  .modal h2 { margin: 0 0 16px; font-size: 19px; }
  .field { margin-bottom: 13px; }
  .field label { display: block; font-size: 12.5px; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
  .field input, .field select { width: 100%; background: var(--panel2); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 10px; font-size: 14px; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--blue); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .legedit { display: grid; grid-template-columns: 1fr 110px 34px; gap: 8px; margin-bottom: 8px; }
  .legedit button { background: var(--red-dim); color: var(--red); border: 0; border-radius: 9px; cursor: pointer; font-size: 16px; }
  .modalfoot { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; gap: 10px; }
  .calc { font-size: 13px; color: var(--muted); }
  .calc b { color: var(--green); }
  @media (max-width: 860px) {
    .kpis { grid-template-columns: repeat(2, 1fr); }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="logo">
      <div class="ball"></div>
      <div>
        <h1>ParlayLab</h1>
        <span>tracker de apuestas · dinámico</span>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="controls">
      <div class="seg" id="fmtSeg" title="Formato de momios">
        <button data-fmt="decimal">Decimal</button>
        <button data-fmt="american">Americano</button>
      </div>
      <button class="btn ghost sm" id="exportBtn" title="Descargar respaldo JSON">⤓ Exportar</button>
      <button class="btn ghost sm" id="importBtn" title="Cargar respaldo JSON">⤒ Importar</button>
      <button class="btn primary" id="newBtn">＋ Nuevo boleto</button>
    </div>
  </header>

  <section class="kpis" id="kpis"></section>

  <section class="grid">
    <div class="card">
      <h3>Evolución de la banca (ganancia acumulada)</h3>
      <div id="bankroll"></div>
    </div>
    <div class="card">
      <h3>Resultados</h3>
      <div class="donutwrap">
        <div id="donut"></div>
        <div class="legend" id="donutLegend"></div>
      </div>
    </div>
  </section>

  <section class="card">
    <h3>Ganancia / pérdida por boleto</h3>
    <div class="bars" id="bars"></div>
  </section>

  <div class="listhead">
    <h2>Boletos</h2>
    <div class="spacer"></div>
    <div class="seg" id="filterSeg">
      <button data-f="todos" class="active">Todos</button>
      <button data-f="pendiente">Pendientes</button>
      <button data-f="ganada">Ganadas</button>
      <button data-f="perdida">Perdidas</button>
    </div>
  </div>
  <div id="list"></div>
</div>

<!-- modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Nuevo boleto</h2>
    <div class="field">
      <label>Nombre / descripción</label>
      <input id="f_nombre" placeholder="Ej. Combinada Liga MX — domingo" />
    </div>
    <div class="row2">
      <div class="field">
        <label>Monto apostado ($)</label>
        <input id="f_stake" type="number" min="0" step="any" placeholder="100" />
      </div>
      <div class="field">
        <label>Fecha</label>
        <input id="f_fecha" type="date" />
      </div>
    </div>
    <div class="field">
      <label>Estado</label>
      <select id="f_estado">
        <option value="pendiente">Pendiente</option>
        <option value="ganada">Ganada</option>
        <option value="perdida">Perdida</option>
        <option value="push">Push / anulada</option>
      </select>
    </div>
    <div class="field">
      <label>Patas (legs) <span id="oddsHint" style="color:var(--blue)"></span></label>
      <div id="legsEdit"></div>
      <button class="btn ghost sm" id="addLeg" type="button">＋ agregar pata</button>
    </div>
    <div class="modalfoot">
      <div class="calc" id="calc"></div>
      <div style="display:flex; gap:10px;">
        <button class="btn ghost" id="cancelBtn">Cancelar</button>
        <button class="btn primary" id="saveBtn">Guardar</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="fileIn" accept="application/json" style="display:none" />

<script>
//// ---------- estado ----------
const KEY = "parlaylab.v1";
let state = { format: "decimal", filter: "todos", parlays: [] };
let editingId = null;
let draftLegs = [];

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) { state = Object.assign(state, JSON.parse(raw)); return true; }
  } catch (e) {}
  return false;
}
function save() { localStorage.setItem(KEY, JSON.stringify(state)); }
const uid = () => Math.random().toString(36).slice(2, 9);

//// ---------- momios / cálculo ----------
const americanToDecimal = (a) => a >= 0 ? 1 + a / 100 : 1 + 100 / Math.abs(a);
const decimalToAmerican = (d) => d >= 2 ? Math.round((d - 1) * 100) : Math.round(-100 / (d - 1));
const combined = (legs) => legs.reduce((p, l) => p * (l.odds || 1), 1);
const payout = (t) => t.stake * combined(t.legs);
const profit = (t) => t.estado === "ganada" ? payout(t) - t.stake : t.estado === "perdida" ? -t.stake : 0;
const impliedProb = (legs) => 1 / combined(legs);
const isSettled = (t) => t.estado === "ganada" || t.estado === "perdida";

const money = (v) => (v < 0 ? "-$" : "$") + Math.abs(v).toLocaleString("es-MX", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const signed = (v) => (v > 0 ? "+" : v < 0 ? "-" : "") + "$" + Math.abs(v).toLocaleString("es-MX", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtOdds = (d) => state.format === "american" ? (decimalToAmerican(d) > 0 ? "+" : "") + decimalToAmerican(d) : d.toFixed(2);
const pct = (v) => (v * 100).toFixed(1) + "%";

//// ---------- KPIs ----------
function renderKPIs() {
  const ps = state.parlays;
  const settled = ps.filter(isSettled);
  const totalStaked = ps.reduce((s, t) => s + t.stake, 0);
  const settledStaked = settled.reduce((s, t) => s + t.stake, 0);
  const pendingStaked = ps.filter(t => t.estado === "pendiente").reduce((s, t) => s + t.stake, 0);
  const net = settled.reduce((s, t) => s + profit(t), 0);
  const roi = settledStaked > 0 ? net / settledStaked : 0;
  const wins = settled.filter(t => t.estado === "ganada").length;
  const winRate = settled.length > 0 ? wins / settled.length : 0;

  const cls = (v) => v > 0 ? "pos" : v < 0 ? "neg" : "";
  const cards = [
    { lbl: "Apostado total", val: money(totalStaked), sub: ps.length + " boletos" },
    { lbl: "Ganancia neta", val: signed(net), cls: cls(net), sub: settled.length + " liquidados" },
    { lbl: "ROI", val: (roi > 0 ? "+" : "") + pct(roi), cls: cls(roi), sub: "sobre lo liquidado" },
    { lbl: "Win rate", val: pct(winRate), sub: wins + "/" + settled.length + " ganadas" },
    { lbl: "En juego", val: money(pendingStaked), sub: ps.filter(t => t.estado === "pendiente").length + " pendientes" },
  ];
  document.getElementById("kpis").innerHTML = cards.map(c => `
    <div class="kpi">
      <div class="lbl">${c.lbl}</div>
      <div class="val mono ${c.cls || ""}">${c.val}</div>
      <div class="sub">${c.sub}</div>
    </div>`).join("");
}

//// ---------- gráfica de banca (área SVG) ----------
function renderBankroll() {
  const el = document.getElementById("bankroll");
  const settled = state.parlays.filter(isSettled)
    .slice().sort((a, b) => (a.fecha || "").localeCompare(b.fecha || "") || 0);
  if (settled.length === 0) { el.innerHTML = `<div class="empty">Aún no hay boletos liquidados.<br>Marca un boleto como ganado o perdido para ver tu banca.</div>`; return; }

  let cum = 0;
  const pts = [{ y: 0, label: "inicio" }];
  settled.forEach(t => { cum += profit(t); pts.push({ y: cum, label: t.nombre }); });

  const W = 660, H = 240, pad = { l: 56, r: 16, t: 16, b: 26 };
  const ys = pts.map(p => p.y);
  let min = Math.min(0, ...ys), max = Math.max(0, ...ys);
  if (min === max) { max += 1; min -= 1; }
  const span = max - min;
  const x = (i) => pad.l + (i / (pts.length - 1)) * (W - pad.l - pad.r);
  const y = (v) => pad.t + (1 - (v - min) / span) * (H - pad.t - pad.b);

  const line = pts.map((p, i) => `${i ? "L" : "M"}${x(i).toFixed(1)},${y(p.y).toFixed(1)}`).join(" ");
  const area = `${line} L${x(pts.length - 1).toFixed(1)},${y(min).toFixed(1)} L${x(0).toFixed(1)},${y(min).toFixed(1)} Z`;
  const end = pts[pts.length - 1].y;
  const col = end >= 0 ? "var(--green)" : "var(--red)";
  const zeroY = y(0).toFixed(1);

  // gridlines
  const ticks = 4;
  let grid = "";
  for (let i = 0; i <= ticks; i++) {
    const val = min + (span * i / ticks);
    const gy = y(val).toFixed(1);
    grid += `<line x1="${pad.l}" y1="${gy}" x2="${W - pad.r}" y2="${gy}" stroke="#1a2738" stroke-width="1"/>`;
    grid += `<text x="${pad.l - 8}" y="${(+gy + 4).toFixed(1)}" text-anchor="end" fill="#5d6b80" font-size="11">${money(val).replace(".00","")}</text>`;
  }
  const dots = pts.map((p, i) => `<circle cx="${x(i).toFixed(1)}" cy="${y(p.y).toFixed(1)}" r="3" fill="${col}"/>`).join("");

  el.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="ga" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${col}" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${grid}
      <line x1="${pad.l}" y1="${zeroY}" x2="${W - pad.r}" y2="${zeroY}" stroke="#36465c" stroke-dasharray="4 4" stroke-width="1"/>
      <path d="${area}" fill="url(#ga)"/>
      <path d="${line}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
    </svg>`;
}

//// ---------- donut SVG ----------
function renderDonut() {
  const ps = state.parlays;
  const counts = {
    ganada: ps.filter(t => t.estado === "ganada").length,
    perdida: ps.filter(t => t.estado === "perdida").length,
    pendiente: ps.filter(t => t.estado === "pendiente").length,
    push: ps.filter(t => t.estado === "push").length,
  };
  const colors = { ganada: "#16c784", perdida: "#ea3943", pendiente: "#f0b429", push: "#2f81f7" };
  const labels = { ganada: "Ganadas", perdida: "Perdidas", pendiente: "Pendientes", push: "Push" };
  const total = ps.length;
  const r = 62, c = 2 * Math.PI * r, cx = 80, cy = 80;

  let off = 0, segs = "";
  if (total > 0) {
    for (const k of ["ganada", "perdida", "pendiente", "push"]) {
      const frac = counts[k] / total;
      if (frac <= 0) continue;
      const len = frac * c;
      segs += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${colors[k]}" stroke-width="20"
        stroke-dasharray="${len.toFixed(2)} ${(c - len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}"
        transform="rotate(-90 ${cx} ${cy})"/>`;
      off += len;
    }
  } else {
    segs = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1a2738" stroke-width="20"/>`;
  }
  const settled = counts.ganada + counts.perdida;
  const wr = settled > 0 ? Math.round(counts.ganada / settled * 100) : 0;

  document.getElementById("donut").innerHTML = `
    <svg viewBox="0 0 160 160" width="160" height="160">
      ${segs}
      <text x="80" y="74" text-anchor="middle" fill="#e7eef8" font-size="30" font-weight="800">${wr}%</text>
      <text x="80" y="96" text-anchor="middle" fill="#8593a8" font-size="12">win rate</text>
    </svg>`;
  document.getElementById("donutLegend").innerHTML = ["ganada", "perdida", "pendiente", "push"].map(k =>
    `<div><span class="dot" style="background:${colors[k]}"></span>${labels[k]} <b style="color:#e7eef8;margin-left:4px">${counts[k]}</b></div>`).join("");
}

//// ---------- barras de ganancia por boleto ----------
function renderBars() {
  const el = document.getElementById("bars");
  const settled = state.parlays.filter(isSettled)
    .slice().sort((a, b) => Math.abs(profit(b)) - Math.abs(profit(a)));
  if (settled.length === 0) { el.innerHTML = `<div class="empty">Sin boletos liquidados todavía.</div>`; return; }
  const maxAbs = Math.max(...settled.map(t => Math.abs(profit(t))), 1);
  el.innerHTML = settled.map(t => {
    const p = profit(t);
    const w = (Math.abs(p) / maxAbs) * 100;
    const col = p >= 0 ? "var(--green)" : "var(--red)";
    return `<div class="barrow">
      <div class="name" title="${escapeHtml(t.nombre)}">${escapeHtml(t.nombre)}</div>
      <div class="track"><div class="fill" style="width:${w.toFixed(1)}%; background:${col}"></div></div>
      <div class="mono" style="text-align:right; color:${col}; font-weight:700">${signed(p)}</div>
    </div>`;
  }).join("");
}

//// ---------- lista de boletos ----------
function escapeHtml(s) { return (s || "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

function renderList() {
  const el = document.getElementById("list");
  let ps = state.parlays.slice().sort((a, b) => (b.fecha || "").localeCompare(a.fecha || ""));
  if (state.filter !== "todos") ps = ps.filter(t => t.estado === state.filter);
  if (ps.length === 0) {
    el.innerHTML = `<div class="card empty">No hay boletos${state.filter !== "todos" ? " en este filtro" : " todavía"}.<br>Pulsa <b>＋ Nuevo boleto</b> para empezar.</div>`;
    return;
  }
  el.innerHTML = ps.map(t => {
    const comb = combined(t.legs);
    const pay = payout(t);
    const p = profit(t);
    const pcol = p > 0 ? "pos" : p < 0 ? "neg" : "";
    const legs = t.legs.map(l => `<div class="leg"><span>${escapeHtml(l.desc || "(pata)")}</span><span class="o mono">${fmtOdds(l.odds)}</span></div>`).join("");
    return `<div class="ticket ${t.estado}">
      <div class="trow">
        <div class="tinfo">
          <div class="tname">${escapeHtml(t.nombre)} <span class="badge b-${t.estado}">${t.estado}</span></div>
          <div class="tmeta">${t.fecha || "sin fecha"} · ${t.legs.length} pata(s) · momios combinados <b class="mono" style="color:var(--blue)">${fmtOdds(comb)}</b> · prob. implícita ${pct(impliedProb(t.legs))}</div>
          <div class="legs">${legs}</div>
        </div>
        <div class="tnums">
          <div class="mono"><small>apostado</small> ${money(t.stake)}</div>
          <div class="mono"><small>pago potencial</small> ${money(pay)}</div>
          <div class="big mono ${pcol}">${isSettled(t) ? signed(p) : "—"}</div>
        </div>
      </div>
      <div class="tactions">
        <button class="btn sm win" onclick="settle('${t.id}','ganada')">✓ Ganada</button>
        <button class="btn sm lose" onclick="settle('${t.id}','perdida')">✗ Perdida</button>
        <button class="btn sm ghost" onclick="settle('${t.id}','pendiente')">↺ Pendiente</button>
        <button class="btn sm ghost" onclick="openForm('${t.id}')">✎ Editar</button>
        <button class="btn sm ghost" onclick="del('${t.id}')">🗑 Borrar</button>
      </div>
    </div>`;
  }).join("");
}

function render() { save(); renderKPIs(); renderBankroll(); renderDonut(); renderBars(); renderList(); }

//// ---------- acciones ----------
window.settle = (id, estado) => {
  const t = state.parlays.find(p => p.id === id);
  if (t) { t.estado = estado; render(); }
};
window.del = (id) => {
  if (confirm("¿Borrar este boleto?")) { state.parlays = state.parlays.filter(p => p.id !== id); render(); }
};

//// ---------- formulario / modal ----------
const overlay = document.getElementById("overlay");
function renderLegsEdit() {
  const wrap = document.getElementById("legsEdit");
  wrap.innerHTML = draftLegs.map((l, i) => `
    <div class="legedit">
      <input placeholder="Equipo / mercado (ej. América gana)" value="${escapeHtml(l.desc)}" oninput="draftLegs[${i}].desc=this.value">
      <input type="number" step="any" placeholder="${state.format === 'american' ? '+150' : '1.90'}" value="${l.raw ?? ''}" oninput="draftLegs[${i}].raw=this.value; updateCalc()">
      <button type="button" onclick="removeLeg(${i})">×</button>
    </div>`).join("");
  updateCalc();
}
window.removeLeg = (i) => { draftLegs.splice(i, 1); renderLegsEdit(); };
function rawToDecimal(raw) {
  const n = parseFloat(raw);
  if (isNaN(n)) return null;
  return state.format === "american" ? americanToDecimal(n) : n;
}
window.updateCalc = () => {
  const decs = draftLegs.map(l => rawToDecimal(l.raw)).filter(d => d && d > 1);
  const stake = parseFloat(document.getElementById("f_stake").value) || 0;
  const calc = document.getElementById("calc");
  if (decs.length === 0 || stake <= 0) { calc.innerHTML = "Ingresa stake y momios…"; return; }
  const comb = decs.reduce((p, d) => p * d, 1);
  calc.innerHTML = `Momios: <b>${fmtOdds(comb)}</b> · Pago: <b>${money(stake * comb)}</b> · Ganas: <b>${money(stake * comb - stake)}</b> · Prob: <b>${pct(1 / comb)}</b>`;
};

window.openForm = (id) => {
  editingId = id || null;
  const t = id ? state.parlays.find(p => p.id === id) : null;
  document.getElementById("modalTitle").textContent = id ? "Editar boleto" : "Nuevo boleto";
  document.getElementById("f_nombre").value = t ? t.nombre : "";
  document.getElementById("f_stake").value = t ? t.stake : "";
  document.getElementById("f_fecha").value = t ? t.fecha : new Date().toISOString().slice(0, 10);
  document.getElementById("f_estado").value = t ? t.estado : "pendiente";
  draftLegs = t ? t.legs.map(l => ({ desc: l.desc, odds: l.odds, raw: state.format === "american" ? decimalToAmerican(l.odds) : l.odds })) : [{ desc: "", raw: "" }, { desc: "", raw: "" }];
  document.getElementById("oddsHint").textContent = "· en formato " + (state.format === "american" ? "americano (+150 / -200)" : "decimal (1.90)");
  renderLegsEdit();
  overlay.classList.add("show");
};
function closeForm() { overlay.classList.remove("show"); }

document.getElementById("saveBtn").onclick = () => {
  const nombre = document.getElementById("f_nombre").value.trim() || "Boleto sin nombre";
  const stake = parseFloat(document.getElementById("f_stake").value) || 0;
  const fecha = document.getElementById("f_fecha").value;
  const estado = document.getElementById("f_estado").value;
  const legs = draftLegs.map(l => ({ desc: (l.desc || "").trim(), odds: rawToDecimal(l.raw) }))
    .filter(l => l.odds && l.odds > 1);
  if (legs.length === 0) { alert("Agrega al menos una pata con momios válidos (>1.00 decimal)."); return; }
  if (stake <= 0) { alert("Ingresa un monto apostado mayor a 0."); return; }
  if (editingId) {
    const t = state.parlays.find(p => p.id === editingId);
    Object.assign(t, { nombre, stake, fecha, estado, legs });
  } else {
    state.parlays.push({ id: uid(), nombre, stake, fecha, estado, legs });
  }
  closeForm(); render();
};
document.getElementById("cancelBtn").onclick = closeForm;
document.getElementById("newBtn").onclick = () => openForm(null);
document.getElementById("addLeg").onclick = () => { draftLegs.push({ desc: "", raw: "" }); renderLegsEdit(); };
document.getElementById("f_stake").addEventListener("input", updateCalc);
overlay.addEventListener("click", (e) => { if (e.target === overlay) closeForm(); });

//// ---------- toggles ----------
document.getElementById("fmtSeg").querySelectorAll("button").forEach(b => {
  b.onclick = () => { state.format = b.dataset.fmt; syncFmt(); render(); if (overlay.classList.contains("show")) { document.getElementById("oddsHint").textContent = "· en formato " + (state.format === "american" ? "americano (+150 / -200)" : "decimal (1.90)"); draftLegs.forEach(l => { l.raw = l.odds ? (state.format === "american" ? decimalToAmerican(l.odds) : l.odds) : l.raw; }); renderLegsEdit(); } };
});
function syncFmt() {
  document.querySelectorAll("#fmtSeg button").forEach(b => b.classList.toggle("active", b.dataset.fmt === state.format));
}
document.getElementById("filterSeg").querySelectorAll("button").forEach(b => {
  b.onclick = () => { state.filter = b.dataset.f; document.querySelectorAll("#filterSeg button").forEach(x => x.classList.toggle("active", x === b)); renderList(); };
});

//// ---------- export / import ----------
document.getElementById("exportBtn").onclick = () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "parlaylab-backup.json"; a.click();
};
document.getElementById("importBtn").onclick = () => document.getElementById("fileIn").click();
document.getElementById("fileIn").onchange = (e) => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => { try { const d = JSON.parse(r.result); if (d.parlays) { state = Object.assign(state, d); syncFmt(); render(); } } catch (err) { alert("Archivo inválido."); } };
  r.readAsText(f);
};

//// ---------- datos de ejemplo ----------

//// ---------- init ----------
if (!load()) { seedDemo(); }
syncFmt();
render();
</script>
